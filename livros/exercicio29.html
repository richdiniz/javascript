<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>lousa</h1>
    <canvas id="tela" width="600" height="400" onclick="cnc()"></canvas>
    <script>
        var tela=document.getElementById("tela")
        var c=tela.getContext("2d")

        c.fillStyle="green"
        c.fillRect(0,0,200,400)
        
        function circulo(x,y,raio){
            c.fillStyle="blue"
            c.beginPath()
            c.arc(x,y,raio,0,2*Math.PI)
            c.fill()
        }
        function limpaTela() {
            c.clearRect(0,0,600,400)
        }

        /*for (let x = 0; x<600; x=x+1){
            limpaTela()
            circulo(x,100,10)
        }*/

        var x=1
        function desenha() {
            limpaTela()
            circulo(x,100,10)
            x++
        }
        setInterval(desenha,30)
    </script>
</body>
</html>
