<body>

    <input type="text" id="numero" placeholder="digite aqui">
    <input type="submit" id="adivinhar" value="compare com meu segredo!">

    <script>
        var segredos=[16, 34, 37, 42, 50, 58];
        var caixaDoNumero=document.getElementById("numero");

        function bc() {
            for (var i = 0; i<segredos.length; i++){
                if (segredos[i]==caixaDoNumero.value){
                    alert("Parabéns! vc acertou um dos "+segredos.length+" numeros secretos ["+segredos+"]")
                    return;
                }
            }
            alert("infelizmente você errou!")
        }

           /* if (segredo==caixaDoNumero.value){

            }else{
                alert("infelizmente você errou!")
                caixaDoNumero.value=""//para limpar dps de clicar
            }*/
        var bt_adv=document.getElementById("adivinhar");
        bt_adv.onclick=bc
    </script>
</body>
