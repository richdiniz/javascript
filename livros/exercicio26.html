<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvas + função/loop</title>
    <style>
        body{
            background-color:aliceblue;
        }
        #tela{
            background-color: white;
        }
    </style>
</head>
<body>
    <h1>canvas com função/repetição(loop)</h1>
    <canvas id="tela" width="600" height="400"></canvas>
    <script>
        function desenhaQuadradoVerde(x,y) {
            var tela=document.getElementById("tela")
            var c=tela.getContext("2d")

            c.fillStyle="green"
            c.fillRect(x,y,50,50)

            c.strokeStyle="black"
            c.strokeRect(x,y,50,50)
        }
        function desenhaQuadradoVermelho(x,y) {
            var tela=document.getElementById("tela")
            var c=tela.getContext("2d")

            c.fillStyle="red"
            c.fillRect(x,y,50,50)

            c.strokeStyle="black"
            c.strokeRect(x,y,50,50)
        }
        function desenhar_bolinhas(x,y) {
            var tela=document.getElementById("tela")
            var c=tela.getContext("2d")

            c.fillStyle="cornflowerblue"
            c.beginPath()
            c.arc(x,y,25,0,2*Math.PI)
            c.fill()
        }
        
        for (var x=0; x<600; x=x+50) {
            desenhaQuadradoVerde(x,0)
            desenhaQuadradoVermelho(x,50)
        }
        for(var x=25;x<600;x=x+50){
            desenhar_bolinhas(x,100)
        }
    </script>
</body>
</html>
