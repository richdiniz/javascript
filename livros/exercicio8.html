<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function pulalinha(){
            document.write("<br><hr><br>")
        }

        function mostra(frase){
            document.write("<big>"+frase+"</big>");
            pulalinha()
        }
        mostra("usando funções para melhorar o código");
        mostra("palavrinha")
        mostra("palavra")//br sempre ao final... só quando utizado o mostra
        mostra("pizza")
        document.write("oi")
    </script>
</body>
</html>
