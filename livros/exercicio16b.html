<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var ano_d_copa= parseInt(prompt("digite o ano inicial"));
        var a_lim=parseInt(prompt("digite o ano limite"));

        var a_olimp=parseInt(prompt("ano q deseja saber..."))

        function mostra(frase) {
            document.write(frase+"<br>")
        }

        while(ano_d_copa<=a_lim){
            mostra(ano_d_copa+" tem copa!")
            ano_d_copa=ano_d_copa+4;
        }
        mostra("Ufa! esses foram os anos de copa até "+ano_d_copa+".")
        
        while (1896<=a_olimp){
            mostra(a_olimp+" tem olimpiadas!")
            a_olimp=a_olimp+4;
        }
    </script>
</body>
</html>
