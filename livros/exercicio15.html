    <h1>MEU JOGUINHO</h1>
    <script>
    // 1. Define o limite aleatório entre 1 e 10 e arredonda para baixo
    var nlimite = Math.random() * 10;
    var nl = Math.floor(nlimite) + 1; // +1 garante que o limite seja pelo menos 1

    // 2. Avisa o usuário sobre o limite
    alert("Pensei num número entre 0 e " + nl);

    // 3. Gera o número secreto (np) entre 0 e o limite estipulado
    var np = Math.floor(Math.random() * (nl + 1)); 
    
    // 4. Pede o chute do jogador
    var chute = prompt("Qual número estou pensando?");

    // 5. Validação se é um número
    if (isNaN(chute) || chute.trim() === "") {
        document.write("<h2>Isso não é um número válido!</h2>");
    } 
    else {
        // Converte o chute para número inteiro para garantir a comparação correta
        chute = parseInt(chute);

        // 6. Checa se acertou ou errou
        if (chute === np) {
            document.write("<h2>🎉 Você acertou! Parabéns!</h2>");
        } else {
            document.write("<h2>❌ Você errou!</h2>");
            
            if (chute > np) {
                document.write("<h3>Seu chute foi MAIOR do que o número que pensei.</h3>");
            } else {
                document.write("<h3>Seu chute foi MENOR do que o número que pensei.</h3>");
            }
            
            document.write("<h3>Eu pensei no número: " + np + "</h3>");
        }
    }
