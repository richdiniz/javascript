<body>
    <h2>TABUADA...</h2>
    <script>
        var nd=parseInt(prompt("digite um número? "))
        //var multiplicador=1;
        function mostra(frase) {
            document.write(frase+"<br>")
        }

        for (var multiplicador=1 ;multiplicador <=10;multiplicador++){
            mostra(nd+" X "+multiplicador+"=  "+multiplicador*nd)
        }
        /*while (multiplicador<=10) {
            mostra(nd+" X "+multiplicador+"=  "+multiplicador*nd)
            multiplicador++
        }*/
    </script>
</body>
