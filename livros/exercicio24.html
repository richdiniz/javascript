<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgba(73, 114, 114, 0.197);
        }
        #tela{
            background-color:black;
        }
    </style>
</head>
<body>
    <h1>gráficos-outras imagens</h1>
    <canvas id="tela" width="600" height="400"></canvas>
    <script>
        var tela=document.getElementById("tela")
        var c=tela.getContext("2d")
        //colunas:
        c.fillStyle ="chocolate"
        c.fillRect(0,0,200,400)
        c.fillStyle="white"
        c.fillRect(200,0,200,400)
        c.fillStyle="pink"
        c.fillRect(400,0,200,400)

        //triâgulo:
        c.fillStyle="blue"
        c.beginPath()
        c.moveTo(300,200)
        c.lineTo(200,400)
        c.lineTo(400,400)
        c.fill()

        //circulo:
        c.fillStyle="blue"
        c.beginPath()
        c.arc(300,200,50,0,2*Math.PI)
        c.fill()
    </script>
</body>
</html>
