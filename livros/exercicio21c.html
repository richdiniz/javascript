<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="numero">
    <input type="submit" id="verificar" value="add e verifique no bingo!">
    <hr>

    <div id="res"></div>
    <script>
        var sorteados=[];
        var res=document.getElementById("res")
        function adicionarSorteado(){
            var numero=document.getElementById("numero").value
            for(var i=0; i<sorteados.length; i++){
                if (sorteados[i]==numero) {
                    alert("Numero já sorteado!")
                    return
                }
            }
            sorteados.push(numero)
            res.innerHTML=sorteados
        }
        var botao=document.getElementById("verificar");
        botao.onclick=adicionarSorteado
    </script>
</body>
</html>
