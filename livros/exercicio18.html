<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function mostra(frase){
            document.write(frase+"<br>")
        }
        var TotalDeFamiliares=parseInt(prompt("Quantos familiares são?"))
        var numero=1
        var idade=0
        var id_soma=0
        while (numero<=TotalDeFamiliares) {
            idade=parseInt(prompt("qual a idade?"))
            id_soma+=idade
            numero++
        }
        var x=(id_soma/TotalDeFamiliares)
        mostra("média dos familiares: "+x.toFixed(2))
    </script>
</body>
</html>
